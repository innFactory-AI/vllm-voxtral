services:
  voxtral:
    image: voxtral-vllm
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - vllm
      - serve
      - mistralai/Voxtral-Mini-4B-Realtime-2602
      - --compilation_config
      - '{"cudagraph_mode": "PIECEWISE"}'
    ports:
      - "8000:8000"
    environment:
      - VLLM_DISABLE_COMPILE_CACHE=1
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  huggingface-cache:
