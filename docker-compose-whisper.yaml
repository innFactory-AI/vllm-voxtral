services:
  whisper:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu
    container_name: whisper-speaches
    ports:
      - "9000:8000"
    environment:
      # Model size: tiny, base, small, medium, large, turbo
      # base is recommended for CPU (good balance of speed/accuracy)
      - WHISPER__MODEL=base

      # Compute type for CPU: int8 (fastest), int8_float32, int8_float16, int8_bfloat16
      - WHISPER__COMPUTE_TYPE=int8

      # Device: cpu or cuda
      - WHISPER__DEVICE=cpu

      # Optional: Set default language for faster processing
      # - WHISPER__LANGUAGE=en

      # Optional: Enable word-level timestamps
      # - WHISPER__WORD_TIMESTAMPS=true

      # Optional: Number of CPU threads (auto-detect by default)
      # - WHISPER__CPU_THREADS=4
    volumes:
      # Cache models to avoid re-downloading
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Adjust based on your system resources
          memory: 4G
        reservations:
          memory: 2G

volumes:
  whisper-models:
